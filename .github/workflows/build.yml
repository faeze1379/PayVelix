name: Build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PayVelix.sln

      - name: Build
        run: dotnet build PayVelix.sln -c Release --no-restore

      - name: Test
        run: dotnet test PayVelix.sln -c Release --no-build --verbosity normal